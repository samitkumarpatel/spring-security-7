<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PKCE Demo</title>
  <style>
    body { font-family: sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    pre  { background: #f4f4f4; padding: 12px; border-radius: 4px; overflow-x: auto; word-break: break-all; white-space: pre-wrap; }
    button { padding: 10px 20px; font-size: 14px; cursor: pointer; }
    #status { margin-top: 12px; color: #555; }
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid #ccc;
      border-top-color: #555;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section { margin-top: 24px; }
    h3 { margin-bottom: 6px; }
    #topBar { display: flex; justify-content: space-between; align-items: center; }
    #logoutBtn { display: none; }
    #expiryBanner {
      display: none;
      margin-top: 16px;
      padding: 12px 16px;
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 4px;
      color: #856404;
      display: none;
      align-items: center;
      gap: 12px;
    }
    #expiryBanner span { flex: 1; }
    #expiryBanner button { padding: 6px 14px; font-size: 13px; }
    #apiSection { margin-top: 24px; }
    #apiError {
      display: none;
      margin-top: 12px;
      padding: 10px 14px;
      background: #f8d7da;
      border: 1px solid #f5c2c7;
      border-radius: 4px;
      color: #842029;
    }
    #apiTable {
      display: none;
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 13px;
    }
    #apiTable th, #apiTable td {
      border: 1px solid #dee2e6;
      padding: 8px 10px;
      text-align: left;
    }
    #apiTable th { background: #f4f4f4; font-weight: 600; }
    #apiTable tr:nth-child(even) { background: #fafafa; }
  </style>
</head>
<body>
  <div id="topBar">
    <h1>PKCE OAuth2 Demo</h1>
    <button id="logoutBtn" onclick="logout()">Logout</button>
  </div>
  <p>Public client using <strong>Authorization Code + PKCE</strong> — no client secret required.</p>

  <button id="loginBtn" onclick="startLogin()">Login with PKCE</button>
  <div id="status"></div>

  <div id="expiryBanner">
    <span id="expiryMsg"></span>
    <button onclick="startLogin()">Login again</button>
  </div>

  <div class="section" id="tokenSection" style="display:none">
    <h3>Token Response</h3>
    <pre id="tokenOutput"></pre>
  </div>

  <div class="section" id="userSection" style="display:none">
    <h3>UserInfo</h3>
    <pre id="userOutput"></pre>
  </div>

  <div id="apiSection" style="display:none">
    <h3>Secure API</h3>
    <button id="apiBtn" onclick="callSecureApi()">Call Secure API</button>
    <div id="apiError"></div>
    <table id="apiTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Phone</th>
        </tr>
      </thead>
      <tbody id="apiTableBody"></tbody>
    </table>
  </div>

  <script>
    const AUTH_SERVER = 'http://127.0.0.1:9000';
    const CLIENT_ID   = 'pkce-client';
    const REDIRECT_URI = 'http://127.0.0.1:7000/pkce-demo.html';
    const SCOPES      = 'openid profile';

    // ── PKCE helpers ──────────────────────────────────────────────────────────
    function randomBase64url(len) {
      const buf = crypto.getRandomValues(new Uint8Array(len));
      return btoa(String.fromCharCode(...buf))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    async function sha256Base64url(plain) {
      const data = new TextEncoder().encode(plain);
      const hash = await crypto.subtle.digest('SHA-256', data);
      return btoa(String.fromCharCode(...new Uint8Array(hash)))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
    }

    // ── JWT helpers ───────────────────────────────────────────────────────────
    function parseJwtPayload(token) {
      try {
        const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(base64));
      } catch {
        return null;
      }
    }

    function isTokenValid(token) {
      if (!token) return false;
      const payload = parseJwtPayload(token);
      if (!payload || !payload.exp) return false;
      return payload.exp * 1000 > Date.now();
    }

    // ── Expiry warning ────────────────────────────────────────────────────────
    const WARN_BEFORE_SECS = 60;
    let _expiryTimer = null;
    let _countdownInterval = null;

    function scheduleExpiryWarning(token) {
      clearTimeout(_expiryTimer);
      clearInterval(_countdownInterval);
      document.getElementById('expiryBanner').style.display = 'none';

      const payload = parseJwtPayload(token);
      if (!payload || !payload.exp) return;

      const msUntilExpiry = payload.exp * 1000 - Date.now();
      const msUntilWarn   = msUntilExpiry - WARN_BEFORE_SECS * 1000;

      if (msUntilWarn <= 0) {
        // Already within the warning window
        showExpiryCountdown(payload.exp);
        return;
      }

      _expiryTimer = setTimeout(() => showExpiryCountdown(payload.exp), msUntilWarn);
    }

    function showExpiryCountdown(expEpochSec) {
      const banner = document.getElementById('expiryBanner');
      const msg    = document.getElementById('expiryMsg');
      banner.style.display = 'flex';

      function tick() {
        const secsLeft = Math.max(0, Math.round((expEpochSec * 1000 - Date.now()) / 1000));
        msg.textContent = `Your session expires in ${secsLeft}s. Please login again to stay connected.`;
        if (secsLeft === 0) {
          clearInterval(_countdownInterval);
          msg.textContent = 'Your session has expired. Please login again.';
        }
      }

      tick();
      _countdownInterval = setInterval(tick, 1000);
    }

    // ── UI helpers ────────────────────────────────────────────────────────────
    function setStatus(msg, loading = false) {
      const el = document.getElementById('status');
      if (loading) {
        el.innerHTML = `<span class="spinner"></span>${msg}`;
      } else {
        el.textContent = msg;
      }
    }
    function show(id) { document.getElementById(id).style.display = 'block'; }
    function hide(id) { document.getElementById(id).style.display = 'none'; }

    function setLoggedInUI(tokens) {
      hide('loginBtn');
      show('logoutBtn');
      show('tokenSection');
      show('apiSection');
      document.getElementById('tokenOutput').textContent = JSON.stringify(tokens, null, 2);
    }

    // ── Secure API call ───────────────────────────────────────────────────────
    async function callSecureApi() {
      const token = localStorage.getItem('access_token');
      const errEl = document.getElementById('apiError');
      const table = document.getElementById('apiTable');
      const btn   = document.getElementById('apiBtn');

      errEl.style.display = 'none';
      table.style.display = 'none';
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>Loading…';

      try {
        const res = await fetch('http://localhost:8080/api/user', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (res.status === 401) {
          errEl.style.display = 'block';
          errEl.innerHTML = 'Session expired or unauthorised. <button onclick="startLogin()" style="margin-left:8px;padding:4px 10px;font-size:13px;">Login again</button>';
          return;
        }

        if (!res.ok) {
          errEl.style.display = 'block';
          errEl.textContent = `API error: ${res.status} ${res.statusText}`;
          return;
        }

        const users = await res.json();
        const tbody = document.getElementById('apiTableBody');
        tbody.innerHTML = users.map(u => `
          <tr>
            <td>${u.id}</td>
            <td>${u.name}</td>
            <td>${u.username}</td>
            <td>${u.email}</td>
            <td>${u.phone}</td>
          </tr>`).join('');
        table.style.display = 'table';
      } catch (err) {
        errEl.style.display = 'block';
        errEl.textContent = `Network error: ${err.message}`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Call Secure API';
      }
    }

    // ── Step 1 : redirect to authorization endpoint ───────────────────────────
    async function startLogin() {
      const verifier  = randomBase64url(64);
      const challenge = await sha256Base64url(verifier);
      const state     = randomBase64url(16);

      sessionStorage.setItem('pkce_verifier', verifier);
      sessionStorage.setItem('pkce_state',    state);

      const params = new URLSearchParams({
        response_type:         'code',
        client_id:             CLIENT_ID,
        redirect_uri:          REDIRECT_URI,
        scope:                 SCOPES,
        state,
        code_challenge:        challenge,
        code_challenge_method: 'S256',
      });

      window.location.href = `${AUTH_SERVER}/oauth2/authorize?${params}`;
    }

    // ── Step 2 : exchange auth code for tokens ────────────────────────────────
    async function handleCallback(code, returnedState) {
      const verifier = sessionStorage.getItem('pkce_verifier');
      const state    = sessionStorage.getItem('pkce_state');

      if (returnedState !== state) {
        setStatus('State mismatch — possible CSRF. Aborting.');
        return;
      }

      sessionStorage.removeItem('pkce_verifier');
      sessionStorage.removeItem('pkce_state');

      setStatus('Exchanging authorization code for tokens…', true);

      const body = new URLSearchParams({
        grant_type:    'authorization_code',
        client_id:     CLIENT_ID,
        redirect_uri:  REDIRECT_URI,
        code,
        code_verifier: verifier,
      });

      const res = await fetch(`${AUTH_SERVER}/oauth2/token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body,
      });

      const tokens = await res.json();
      if (!res.ok) {
        setStatus('Token exchange failed.');
        show('tokenSection');
        document.getElementById('tokenOutput').textContent = JSON.stringify(tokens, null, 2);
        return;
      }

      localStorage.setItem('access_token', tokens.access_token);
      if (tokens.id_token) {
        localStorage.setItem('id_token', tokens.id_token);
      }
      if (tokens.refresh_token) {
        localStorage.setItem('refresh_token', tokens.refresh_token);
      }

      setLoggedInUI(tokens);
      setStatus('Tokens received. Fetching user info…', true);

      // Remove the code from the URL without reloading
      window.history.replaceState({}, document.title, REDIRECT_URI);

      await fetchUserInfo(tokens.access_token);
    }

    // ── Step 3 : call userinfo endpoint ──────────────────────────────────────
    async function fetchUserInfo(accessToken) {
      const res  = await fetch(`${AUTH_SERVER}/userinfo`, {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      const info = await res.json();
      show('userSection');
      document.getElementById('userOutput').textContent = JSON.stringify(info, null, 2);
      setStatus('');
      scheduleExpiryWarning(accessToken);
    }

    function logout() {
      clearTimeout(_expiryTimer);
      clearInterval(_countdownInterval);
      localStorage.removeItem('access_token');
      localStorage.removeItem('id_token');
      localStorage.removeItem('refresh_token');
      sessionStorage.clear();
      window.location.href = `${AUTH_SERVER}/logout`;
    }

    // ── Bootstrap ─────────────────────────────────────────────────────────────
    (async () => {
      const params = new URLSearchParams(window.location.search);
      const code   = params.get('code');
      const state  = params.get('state');

      if (code) {
        hide('loginBtn');
        await handleCallback(code, state);
      } else if (params.get('error')) {
        setStatus(`Authorization error: ${params.get('error_description') ?? params.get('error')}`);
      } else {
        // Check for a valid stored token (handles hard refresh)
        const storedToken = localStorage.getItem('access_token');
        if (isTokenValid(storedToken)) {
          const payload = parseJwtPayload(storedToken);
          setLoggedInUI({ access_token: storedToken, exp: payload.exp });
          setStatus('Restoring session… Fetching user info…', true);
          await fetchUserInfo(storedToken);
        }
      }
    })();
  </script>
</body>
</html>
